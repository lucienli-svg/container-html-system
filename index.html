      }
      storageConfig.forEach((cfg, idx) => {
        storageHtml += `<tr>
          <td><input type="date" id="storage_start_${idx}" value="${toDateInput(cfg.startDate)}" style="width:118px;"></td>
          <td><input type="date" id="storage_end_${idx}" value="${toDateInput(cfg.endDate)}" style="width:118px;"></td>
          <td><input type="number" id="storage_fixedDays_${idx}" value="${cfg.fixedDays ?? 15}" min="0" placeholder="例如15" style="width:110px;"></td>
          <td><input type="number" id="storage_fixedRate_${idx}" value="${cfg.fixedRate ?? 0}" min="0" step="0.01" placeholder="正常费用" style="width:110px;"></td>
          <td><input type="number" id="storage_overtimeRate_${idx}" value="${cfg.overtimeRate ?? 0}" min="0" step="0.01" placeholder="异常日费" style="width:130px;"></td>
          <td><button class="btn btn-sm btn-danger" onclick="deleteStoragePeriod(${idx})">删除</button></td>
        </tr>`;
      });
      storageHtml += `</tbody></table></div><div style="margin-top:12px;"><button class="btn btn-sm btn-success" onclick="addStoragePeriod()">+ 添加堆存费时段</button></div>`;
      
      let demurrageHtml = '<h3>🚢 滞箱费配置（按时间段）</h3><div class="table-wrapper"><table class="data-table"><thead><tr><th>船公司</th><th>箱型</th><th>生效开始</th><th>生效结束</th><th>免费天数</th><th>日费率(USD)</th><th>操作</th></tr></thead><tbody>';
      if(demurrageConfig.length === 0){
        demurrageHtml += '<tr><td colspan="7" style="text-align:center;color:#909399;">暂无配置，点击下方按钮添加</td></tr>';
      }
      demurrageConfig.forEach((cfg, idx) => {
        demurrageHtml += `<tr>
          <td><select id="dem_carrier_${idx}"><option value="MSC" ${cfg.carrier==='MSC'?'selected':''}>MSC</option><option value="COSCO" ${cfg.carrier==='COSCO'?'selected':''}>COSCO</option><option value="长荣" ${cfg.carrier==='长荣'?'selected':''}>长荣</option></select></td>
          <td><select id="dem_type_${idx}"><option value="普柜" ${cfg.type==='普柜'?'selected':''}>普柜</option><option value="冷柜" ${cfg.type==='冷柜'?'selected':''}>冷柜</option></select></td>
          <td><input type="date" id="dem_start_${idx}" value="${toDateInput(cfg.startDate)}"></td>
          <td><input type="date" id="dem_end_${idx}" value="${toDateInput(cfg.endDate)}"></td>
          <td><input type="number" id="dem_freeDays_${idx}" value="${cfg.freeDays}" style="width:80px;"></td>
          <td><input type="number" id="dem_rate_${idx}" value="${cfg.ratePerDay}" style="width:80px;"></td>
          <td><button class="btn btn-sm btn-danger" onclick="deleteDemPeriod(${idx})">删除</button></td>
        </tr>`;
      });
      demurrageHtml += `</tbody></table><div style="margin-top:16px;"><button class="btn btn-success" onclick="addDemPeriod()">+ 添加滞箱费时段</button></div>`;
      
      let warningHtml = `<h3>⚠️ 预警配置</h3><div class="rate-period-row">
        <label>堆存费预警天数: <input type="number" id="warningStorageDays" value="${warningConfig.storageWarningDays}" style="width:80px;"> 天</label>
        <label style="margin-left:20px;">滞箱费预警天数: <input type="number" id="warningDemurrageDays" value="${warningConfig.demurrageWarningDays}" style="width:80px;"> 天</label>
        <button class="btn btn-primary" onclick="saveWarningConfig()">保存预警配置</button>
      </div>`;
      
      container.innerHTML = `<div class="card"><div class="card-header"><span class="card-title">💰 费率配置</span></div>${storageHtml}<hr>${demurrageHtml}<hr>${warningHtml}<div style="margin-top:16px;"><button class="btn btn-primary" onclick="saveAllRates()">保存所有配置</button></div></div>`;
    }
    
    window.addStoragePeriod = function(){ storageConfig.push({startDate: fmtDate(getTodayStr()), endDate: fmtDate(getTodayStr()), fixedDays: 15, fixedRate: 0, overtimeRate: 0}); renderRateConfig(document.getElementById('mainContent')); };
    window.deleteStoragePeriod = function(idx){ storageConfig.splice(idx,1); renderRateConfig(document.getElementById('mainContent')); };
    window.addDemPeriod = function(){ demurrageConfig.push({carrier: "MSC", type: "普柜", startDate: fmtDate(getTodayStr()), endDate: fmtDate(getTodayStr()), freeDays: 28, ratePerDay: 170}); renderRateConfig(document.getElementById('mainContent')); };
    window.deleteDemPeriod = function(idx){ demurrageConfig.splice(idx,1); renderRateConfig(document.getElementById('mainContent')); };
    
    window.saveWarningConfig = function(){
      warningConfig.storageWarningDays = parseInt(document.getElementById('warningStorageDays').value);
      warningConfig.demurrageWarningDays = parseInt(document.getElementById('warningDemurrageDays').value);
      localStorage.setItem('cc_warningConfig', JSON.stringify(warningConfig));
      localStorage.removeItem('cc_lastFeeUpdate');
      updateDailyFees();
      alert('预警配置已保存');
    };
    
    window.saveAllRates = function(){
      let newStorageConfig = [];
      for(let i=0; i<storageConfig.length; i++){
        let startInput = document.getElementById(`storage_start_${i}`);
        let endInput = document.getElementById(`storage_end_${i}`);
        let fixedDaysInput = document.getElementById(`storage_fixedDays_${i}`);
        let fixedRateInput = document.getElementById(`storage_fixedRate_${i}`);
        let overtimeRateInput = document.getElementById(`storage_overtimeRate_${i}`);
        if(startInput && endInput){
          let fixedDays = Math.max(0, parseInt(fixedDaysInput.value || '0'));
          let fixedRate = Math.max(0, parseFloat(fixedRateInput.value || '0'));
          let overtimeRate = Math.max(0, parseFloat(overtimeRateInput.value || '0'));
          newStorageConfig.push({startDate: fmtDate(startInput.value), endDate: fmtDate(endInput.value), fixedDays, fixedRate, overtimeRate});
        }
      }
      if(newStorageConfig.length > 0) storageConfig = newStorageConfig;
      
      let newDemurrageConfig = [];
      for(let i=0; i<demurrageConfig.length; i++){
        let carrierSelect = document.getElementById(`dem_carrier_${i}`);
        let typeSelect = document.getElementById(`dem_type_${i}`);
        let startInput = document.getElementById(`dem_start_${i}`);
        let endInput = document.getElementById(`dem_end_${i}`);
        let freeDaysInput = document.getElementById(`dem_freeDays_${i}`);
        let rateInput = document.getElementById(`dem_rate_${i}`);
        if(carrierSelect && startInput){
          newDemurrageConfig.push({carrier: carrierSelect.value, type: typeSelect.value, startDate: fmtDate(startInput.value), endDate: fmtDate(endInput.value), freeDays: parseInt(freeDaysInput.value), ratePerDay: parseFloat(rateInput.value)});
        }
      }
      if(newDemurrageConfig.length > 0) demurrageConfig = newDemurrageConfig;
      
      saveData();
      localStorage.removeItem('cc_lastFeeUpdate');
      updateDailyFees();
      alert('所有配置已保存，费用将重新计算');
    };
    
    // 费用报表
    function renderFeeReport(container){
      let currentDate = getTodayStr();
      let feeData = containers.map(c => {
        let fees = calculateFeesForContainer(c, currentDate);
        return { ...c, storageFee: fees.storageFee, normalStorageFee: fees.normalStorageFee, abnormalStorageFee: fees.abnormalStorageFee, storageDays: fees.storageDays, storageAbnormalDays: fees.storageAbnormalDays, demurrageFee: fees.demurrageFee };
      });
      let totalNormalStorage = feeData.reduce((sum, c) => sum + c.normalStorageFee, 0);
      let totalAbnormalStorage = feeData.reduce((sum, c) => sum + c.abnormalStorageFee, 0);
      let totalStorage = feeData.reduce((sum, c) => sum + c.storageFee, 0);
      let totalDemurrage = feeData.reduce((sum, c) => sum + c.demurrageFee, 0);
      container.innerHTML = `<div class="card"><div class="card-header"><span class="card-title">📈 费用报表</span><div><button class="btn export-btn" onclick="exportFeeReport()">📥 导出Excel</button></div></div>
        <div class="stats-grid"><div class="stat-card"><div class="stat-number">R$ ${totalNormalStorage.toFixed(2)}</div><div class="stat-label">正常堆存费</div></div><div class="stat-card warning-card"><div class="stat-number warning-number">R$ ${totalAbnormalStorage.toFixed(2)}</div><div class="stat-label">异常堆存费</div></div><div class="stat-card"><div class="stat-number">R$ ${totalStorage.toFixed(2)}</div><div class="stat-label">堆存费合计</div></div><div class="stat-card"><div class="stat-number">$ ${totalDemurrage.toFixed(2)}</div><div class="stat-label">滞箱费总额</div></div></div>
        <div class="fee-card"><div class="fee-row"><span class="fee-label">费用计算截止日期:</span><span class="fee-value">${fmtDate(currentDate)}</span></div><div class="fee-row"><span class="fee-label">说明:</span><span class="fee-label">堆存费计算至提箱日，正常收费时长和异常日费按费率配置匹配；滞箱费计算至还箱日，未发生事件则以今日为截止</span></div></div>
        <div id="feeTable"></div></div>`;
      renderTable('feeTable',['批次','箱号','船公司','箱型','到港日期','提箱日期','还箱日期','堆存天数','正常堆存费(雷亚尔)','异常堆存费(雷亚尔)','堆存费合计(雷亚尔)','滞箱费(美元)'],feeData,(c)=>{
        let returnRec = returnRecords.find(r => r.containerId === c.id && r.isReturnConfirmed);
        let returnDate = returnRec ? returnRec.returnDate : '-';
        let tr=document.createElement('tr');
        tr.innerHTML=`<td>${c.batch}</td><td>${c.containerNo}</td><td>${c.vessel}</td><td>${c.containerType||'-'}</td><td>${fmtDate(c.eta)}</td><td>${c.actualPickupTime?fmtDate(c.actualPickupTime.split('T')[0]):'-'}</td><td>${fmtDate(returnDate)}</td><td>${c.storageDays}</td><td style="text-align:center;color:#67c23a;font-weight:600;">R$ ${c.normalStorageFee.toFixed(2)}</td><td style="text-align:center;color:#e6a23c;font-weight:600;">R$ ${c.abnormalStorageFee.toFixed(2)}</td><td style="text-align:center;color:#2a5298;font-weight:600;">R$ ${c.storageFee.toFixed(2)}</td><td style="text-align:center;color:#f56c6c;font-weight:600;">$ ${c.demurrageFee.toFixed(2)}</td>`;
        return tr;
      });
    }
    
    window.exportFeeReport = function(){
      let currentDate = getTodayStr();
      let feeData = containers.map(c => {
        let fees = calculateFeesForContainer(c, currentDate);
        let returnRec = returnRecords.find(r => r.containerId === c.id && r.isReturnConfirmed);
        return { 批次: c.batch, 集装箱号: c.containerNo, 船公司: c.vessel, 箱型: c.containerType || '-', 到港日期: fmtDate(c.eta), 提箱日期: c.actualPickupTime ? fmtDate(c.actualPickupTime.split('T')[0]) : '-', 还箱日期: returnRec ? fmtDate(returnRec.returnDate) : '-', 堆存天数: fees.storageDays, 正常堆存费_雷亚尔: fees.normalStorageFee.toFixed(2), 异常堆存费_雷亚尔: fees.abnormalStorageFee.toFixed(2), 堆存费合计_雷亚尔: fees.storageFee.toFixed(2), 滞箱费_美元: fees.demurrageFee.toFixed(2) };
      });
      let ws = XLSX.utils.json_to_sheet(feeData);
      let wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '费用报表');
      XLSX.writeFile(wb, `费用报表_${currentDate}.xlsx`);
    };
    
    function openModal(){ document.getElementById('modal').style.display='flex'; }
    function closeModal(){ document.getElementById('modal').style.display='none'; }
    
    function login(){
      let user=users[document.getElementById('loginUsername').value];
      if(user&&user.password===document.getElementById('loginPassword').value){
        currentUser=user;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainApp').style.display='block';
        document.getElementById('currentRole').innerText=user.role;
        document.getElementById('currentUser').innerText=user.name;
        loadData();
        renderSidebar();
        renderContent();
      } else { alert('用户名或密码错误'); }
    }
    
    function logout(){ currentUser=null; document.getElementById('loginPage').style.display='flex'; document.getElementById('mainApp').style.display='none'; }
    
    loadData();
  </script>
</body>
</html>
