   4）覆盖旧版本多次重复定义造成的缓存/旧数据问题。
*/
(function(){
  function v429TodayTomorrow(){
    const t = getTodayStr();
    const d = new Date(t + 'T00:00:00');
    d.setDate(d.getDate() + 1);
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return [t, `${d.getFullYear()}-${m}-${day}`];
  }
  function v429AreaOfPlan(p){
    if(!p) return '';
    const w = String(p.workshop || '').toLowerCase();
    if(w === 'welding') return 'Welding';
    if(w === 'assembly_b' || w === 'assembly_p') return 'Assembly';
    const a = String(p.area || '').toLowerCase();
    if(a === 'welding') return 'Welding';
    if(a === 'assembly') return 'Assembly';
    if(typeof productionPlanAreaFromWorkshop === 'function') return productionPlanAreaFromWorkshop(p.workshop);
    return '';
  }
  function v429ValidPlans(date, area){
    return (productionPlans || []).filter(p => {
      if(!p || p.voided || p.planMode === 'schedule_voided') return false;
      if(p.planMode && p.planMode !== 'schedule') return false;
      if(String(p.date || '') !== String(date || '')) return false;
      return v429AreaOfPlan(p) === area;
    }).sort((a,b) => {
      const oa = typeof getProductionPlanOrder === 'function' ? getProductionPlanOrder(a) : Number(a.planOrder || 999999);
      const ob = typeof getProductionPlanOrder === 'function' ? getProductionPlanOrder(b) : Number(b.planOrder || 999999);
      return oa - ob || String(a.batch||'').localeCompare(String(b.batch||''),'zh-CN',{numeric:true});
    });
  }
  window.v42GetBoardDates = v429TodayTomorrow;
  window.v42DateLabel = function(d,i){ return `${fmtDate(d)} ${i===0?'今日':'明日'}`; };
  window.v426ValidProductionPlansForBoard = v429ValidPlans;
  window.v42BuildBatchGroups = function(area, date){
    const areaKey = area === 'Welding' ? 'welding' : 'assembly';
    const groups = {};
    const orders = {};
    v429ValidPlans(date, area).forEach(p => {
      const batch = String(p.batch || '').trim().toUpperCase();
      if(!batch || (typeof v42IsSupplementBatch === 'function' && v42IsSupplementBatch(batch))) return;
      const order = typeof getProductionPlanOrder === 'function' ? getProductionPlanOrder(p) : Number(p.planOrder || 999999);
      if(!groups[batch]) groups[batch] = new Set();
      orders[batch] = Math.min(orders[batch] || 999999, order);
      const rule = typeof v42BatchRule === 'function' ? v42BatchRule(batch) : {welding:[], assembly:[]};
      const defaults = rule[areaKey] || [];
      if(p.seq){
        const n = typeof v42SeqNum === 'function' ? v42SeqNum(p.seq) : parseInt(p.seq,10);
        if(n) groups[batch].add(n);
      }else{
        defaults.forEach(n => groups[batch].add(n));
      }
    });
    return Object.entries(groups)
      .sort((a,b) => (orders[a[0]]||999999) - (orders[b[0]]||999999) || a[0].localeCompare(b[0],'zh-CN',{numeric:true}))
      .map(([batch,set]) => ({batch, planOrder: orders[batch] || 999999, seqs: [...set].filter(Boolean).sort((x,y)=>x-y)}));
  };
  window.v42RenderProductionPanel = function(area){
    const dates = v429TodayTomorrow();
    const cls = area === 'Welding' ? 'welding' : 'assembly';
    const icon = area === 'Welding' ? '🔧' : '🚚';
    return `<div class="v42-panel ${cls}">
      <div class="v42-panel-head"><div class="v42-panel-name">${icon} ${area.toUpperCase()}</div><div style="font-size:12px;opacity:.75;">生产保供进度</div></div>
      ${typeof v42PanelKpis === 'function' ? v42PanelKpis(area) : ''}
      ${dates.map((d,i)=>{ const groups = window.v42BuildBatchGroups(area,d); return `<div class="v42-date-block"><div class="v42-date-title">📅 ${window.v42DateLabel(d,i)} <span style="margin-left:auto;font-size:11px;opacity:.7;">${groups.length} batches</span></div>${groups.length ? `<table class="v42-batch-table"><thead><tr><th>BATCH</th><th>SIDER</th><th>CONTAINER</th><th>完成率</th></tr></thead><tbody>${groups.map(g => typeof v42RenderBatchRow === 'function' ? v42RenderBatchRow(g) : '').join('')}</tbody></table>` : `<div style="padding:14px;opacity:.65;">暂无生产计划</div>`}</div>`; }).join('')}
      <div class="v42-legend"><span><i class="v42-dot" style="background:#16a34a"></i>已完成</span><span><i class="v42-dot" style="background:#2563eb"></i>厂内等待</span><span><i class="v42-dot" style="background:#eab308"></i>门口</span><span><i class="v42-dot" style="background:#0ea5e9"></i>卸货中</span><span><i class="v42-dot" style="background:#f97316"></i>运输中</span><span><i class="v42-dot" style="background:#dc2626"></i>未发运</span></div>
    </div>`;
  };
  window.v42RenderProductionBoard = function(){
    return `<div class="v42-section-title"><h3>🏭 生产保供看板</h3><span class="v42-mini-note">仅显示今日、明日生产计划；批次列表直接读取生产计划维护模块最新数据</span></div><div class="v42-board">${window.v42RenderProductionPanel('Welding')}${window.v42RenderProductionPanel('Assembly')}</div>`;
  };
  window.renderDashboard = function(container){
    let activeContainers = containers.filter(isOperationalVisibleContainer);
    let total = activeContainers.length;
    let waiting = activeContainers.filter(c=>c.customsStatus==='清关中').length;
    let inTransit = transportTasks.filter(t=>t.status==='in_transit' && isOperationalVisibleTask(t)).length;
    let stock = {'港口':0,'RG堆场':0,'Rio Claro':0,'IRA库房':0,'工厂':0};
    let producedCount = containers.filter(c => isProducedCompletedContainerId(c.id)).length;
    activeContainers.forEach(c=>{ let loc=getContainerLocation(c.id); if(loc==='已生产') return; stock[loc]=(stock[loc]||0)+1; });
    let totalAbnormalStorage = cachedFeeData.totalAbnormalStorage || 0;
    let totalDemurrage = cachedFeeData.totalDemurrage || 0;
    let storageWarningCount = cachedFeeData.storageWarningList.length;
    let demurrageWarningCount = cachedFeeData.demurrageWarningList.length;
    let dailyReport = getDailyOperationReport(getTodayStr());
    container.innerHTML = `
      <div class="v42-hero"><div class="v42-hero-title">GWM CONTAINER MONITORING — V42.12</div><div class="v42-hero-sub">物流运营工作台 + 生产保供看板｜费用报表增加清关用时｜${fmtDate(getTodayStr())}</div></div>
      <div class="v42-section-title"><h3>📊 物流运营工作台</h3><span class="v42-mini-note">到厂进度由下方生产保供看板展示，本区保留费用、清关、提箱和库存核心指标</span></div>
      <div class="card">
        <div class="card-header"><span class="card-title">📅 每日运营报表</span><span style="font-size:12px;color:#909399;">统计日期：${fmtDate(getTodayStr())}</span></div>
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 8px;">
          <div class="stat-card warning-card" onclick="showDailyReportDetail('todayAbnormalStorage')" style="padding:12px;cursor:pointer;"><div class="stat-number warning-number" style="font-size:22px;">R$ ${dailyReport.todayAbnormalStorage.toFixed(2)}</div><div class="stat-label">今日新增异常堆存费</div></div>
          <div class="stat-card danger-card" onclick="showDailyReportDetail('todayDemurrage')" style="padding:12px;cursor:pointer;"><div class="stat-number danger-number" style="font-size:22px;">$ ${dailyReport.todayDemurrage.toFixed(2)}</div><div class="stat-label">今日新增滞箱费</div></div>
          <div class="stat-card" onclick="showDailyReportDetail('clearanceCompleted')" style="padding:12px;cursor:pointer;"><div class="stat-number" style="font-size:24px;">${dailyReport.clearanceCompleted}</div><div class="stat-label">今日清关完成</div></div>
          <div class="stat-card" onclick="showDailyReportDetail('plannedPickup')" style="padding:12px;cursor:pointer;"><div class="stat-number" style="font-size:24px;">${dailyReport.plannedPickup}</div><div class="stat-label">今日计划提箱</div></div>
          <div class="stat-card" onclick="showDailyReportDetail('actualPickup')" style="padding:12px;cursor:pointer;"><div class="stat-number" style="font-size:24px;">${dailyReport.actualPickup}</div><div class="stat-label">今日实际提箱</div></div>
          <div class="stat-card" onclick="showDailyReportDetail('clearedPendingPickup')" style="padding:12px;cursor:pointer;"><div class="stat-number" style="font-size:24px;">${dailyReport.clearedPendingPickup}</div><div class="stat-label">已清关待提箱</div></div>
          <div class="stat-card warning-card" onclick="showDailyReportDetail('clearedPendingPickupAbnormal')" style="padding:12px;cursor:pointer;"><div class="stat-number warning-number" style="font-size:24px;">${dailyReport.clearedPendingPickupAbnormal}</div><div class="stat-label">待提箱-已产生异常堆存费</div></div>
          <div class="stat-card" onclick="showDailyReportDetail('clearedPendingPickupNormal')" style="padding:12px;cursor:pointer;"><div class="stat-number" style="font-size:24px;">${dailyReport.clearedPendingPickupNormal}</div><div class="stat-label">待提箱-未产生异常堆存费</div></div>

        <div class="stat-card" onclick="jumpTo('customs')"><div class="stat-number">${waiting}</div><div class="stat-label">待清关</div></div>

        <div class="stat-card" style="background:#feefe6;"><div class="stat-number" style="color:#f56c6c;">$ ${totalDemurrage.toFixed(2)}</div><div class="stat-label">滞箱费总额</div></div>
      </div>

        <div class="stat-card danger-card" onclick="showWarningDetail('demurrage')" style="cursor:pointer;"><div class="stat-number danger-number">${demurrageWarningCount}</div><div class="stat-label">⚠️ ${warningConfig.demurrageWarningDays}天内将产生滞箱费</div></div>

      ${window.v42RenderProductionBoard()}
    `;

  };
})();

/* ==================== V42.15：运输任务按港口/其他分板块 + 保供看板Hover精简 ==================== */
(function(){
  function v4215Attr(v){
    return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function v4215DateOfTask(t){
    return getDatePart(t.arrivalDate || t.estimatedArrival || t.planDate || '');
  }
  function v4215Origin(t){
    return t.from || t.origin || t.fromLocation || t.source || (t.type === 'pending' ? '港口' : '港口');
  }
  function v4215IsPortTask(t){
    return t.type === 'pending' || v4215Origin(t) === '港口' || String(v4215Origin(t)).toLowerCase().includes('port');
  }
  function v4215IsJslUser(){
    return currentUser && (currentUser.carrier === 'JSL' || currentUser.role === '运输公司JSL' || currentUser.cloudRole === 'JSL');
  }
  function v4215ContainerFor(batch, seq){
    const b = String(batch || '').toUpperCase();
    const s = String(seq || '').trim();
    return containers.find(c => String(c.batch || '').toUpperCase() === b && String(c.containerSeq || c.seq || '').trim() === s);
  }

  // 保供看板：鼠标悬停只显示四项：集装箱号、批次号、集装箱序号、当前状态
  window.v42RenderBatchRow = function(group){
    let done = 0, total = group.seqs.length || 1;
    const sider = [], cont = [];
    group.seqs.forEach(seq => {
      const task = v42TaskFor(group.batch, seq);
      const c = v4215ContainerFor(group.batch, seq);
      const state = v42ChipState(task);
      if(state === 'done') done++;
      const type = task ? v42VehicleTypeFromOrigin(task.from) : 'CONTAINER';
      const containerNo = task?.containerNo || c?.containerNo || '-';
      const title = `集装箱号：${containerNo}\n批次号：${group.batch}\n集装箱序号：${seq}\n当前状态：${v42StatusText(state)}`;
      const chip = `<span class="v42-chip ${state}" title="${v4215Attr(title)}">${seq}</span>`;
      if(type === 'SIDER') sider.push(chip); else cont.push(chip);
    });
    const pct = Math.round(done / total * 100);
    return `<tr><td><span style="display:inline-block;background:rgba(255,255,255,.12);border-radius:999px;padding:2px 7px;margin-right:6px;font-size:10px;">#${group.planOrder===999999?'-':group.planOrder}</span><span class="v42-batch-name">${group.batch}</span><div style="font-size:10px;color:#cbd5e1;margin-top:3px;">${v42BatchRule(group.batch).model}</div></td><td><div class="v42-chip-wrap">${sider.join('')||'<span style="opacity:.35;">—</span>'}</div></td><td><div class="v42-chip-wrap">${cont.join('')||'<span style="opacity:.35;">—</span>'}</div></td><td><div style="font-weight:900;">${done}/${total}</div><div class="v42-progress"><span style="width:${pct}%"></span></div></td></tr>`;
  };

  function v4215BuildTransportData(selectedDate){
    const myPickupTasks = pickupPlans
      .filter(p => canViewCarrier(p.carrier) && p.status !== 'confirmed' && p.status !== 'cancelled' && !isProducedCompletedContainerId(p.containerId))
      .map(p => ({...p, type:'pending', from:'港口'}));
    const myTransitTasks = transportTasks
      .filter(t => canViewCarrier(t.carrier) && t.status === 'in_transit' && isTransportCompanyVisibleTask(t))
      .map(t => ({...t, type:'transit'}));
    const all = [...myPickupTasks, ...myTransitTasks];
    const dates = Array.from(new Set(all.map(v4215DateOfTask).filter(Boolean))).sort();
    const date = selectedDate || dates[0] || '';
    const dayItems = all.filter(t => v4215DateOfTask(t) === date);
    let portTasks = dayItems.filter(v4215IsPortTask);
    let otherTasks = dayItems.filter(t => !v4215IsPortTask(t));
    if(v4215IsJslUser()) otherTasks = [];
    portTasks.sort((a,b)=>String(a.arrivalDate||a.estimatedArrival||'').localeCompare(String(b.arrivalDate||b.estimatedArrival||'')));
    otherTasks.sort((a,b)=>String(a.estimatedArrival||a.arrivalDate||'').localeCompare(String(b.estimatedArrival||b.arrivalDate||'')));
    return {dates, selectedDate:date, portTasks, otherTasks};
  }

    return `<span class="status-badge status-transport">运输中</span>`;
  }
  function v4215PlanTime(item){ return item.type === 'pending' ? item.arrivalDate : item.estimatedArrival; }
  function v4215Destination(item){ return item.type === 'pending' ? item.destination : item.to; }
  function v4215Dock(item){ return item.unloadingDock || '-'; }
  function v4215OriginText(item){ return v4215Origin(item) || '-'; }
  function v4215ActionCell(item){
    if(item.type === 'pending') return `<input type="date" id="pickupTime_${item.id}" class="form-control" style="width:125px;margin-bottom:4px;"><br><button class="btn btn-sm btn-success" onclick="confirmPickupTask(${item.id})">确认提箱</button>`;

  // ==================== V42.19 修复：提箱计划到工厂同步进入工厂到货监控 ====================
  function v4217IsFactoryDestination(dest){
    const d = String(dest || '').trim();
    return d === '工厂' || d.toLowerCase() === 'factory' || d.toUpperCase() === 'GWM';
  }

  function v4217FindExistingFactoryTaskByPickupPlan(plan){
    if(!plan) return null;
    return transportTasks.find(t =>
      t &&
      t.to === '工厂' &&
      !t.cancelled &&
      t.source === 'pickupPlan' &&
      (String(t.sourcePlanId || '') === String(plan.id || '') ||
       (!t.sourcePlanId && String(t.containerId || '') === String(plan.containerId || '') && String(t.estimatedArrival || '') === String(plan.arrivalDate || '')))
    ) || null;
  }

  function v4217EnsureFactoryReceivingTaskFromPickupPlan(plan){
    if(!plan || !v4217IsFactoryDestination(plan.destination) || plan.status === 'cancelled') return null;
    let cont = containers.find(c => String(c.id) === String(plan.containerId)) || {};
    let task = v4217FindExistingFactoryTaskByPickupPlan(plan);
    if(!task){
      task = {
        id: nextIds.task++,
        containerId: plan.containerId,
        containerNo: plan.containerNo || cont.containerNo || '',
        containerSeq: cont.containerSeq || plan.containerSeq || '',
        batch: plan.batch || cont.batch || '',
        blNo: getTaskBlText(plan),
        iraNo: getIraList(plan.containerId),
        from: '港口',
        to: '工厂',
        carrier: plan.carrier || 'RG',
        status: plan.status === 'confirmed' ? 'in_transit' : 'planned',
        operationStatus: 'not_arrived',
        estimatedArrival: plan.arrivalDate || '',
        unloadingDock: plan.unloadingDock || '',
        source: 'pickupPlan',
        sourcePlanId: plan.id,
        createdAt: new Date().toISOString(),
        publishedAt: new Date().toISOString(),
        gateArrivalTime:'', gateReleaseTime:'', waitingAreaTime:'', unloadStartTime:'', unloadFinishTime:''
      };
      transportTasks.push(task);
    }else{
      task.sourcePlanId = task.sourcePlanId || plan.id;
      task.containerId = plan.containerId;
      task.containerNo = plan.containerNo || task.containerNo || cont.containerNo || '';
      task.containerSeq = cont.containerSeq || plan.containerSeq || task.containerSeq || '';
      task.batch = plan.batch || task.batch || cont.batch || '';
      task.blNo = getTaskBlText(plan);
      task.iraNo = getIraList(plan.containerId) || task.iraNo || '';
      task.from = '港口';
      task.to = '工厂';
      task.carrier = plan.carrier || task.carrier || 'RG';
      task.estimatedArrival = plan.arrivalDate || task.estimatedArrival || '';
      task.unloadingDock = plan.unloadingDock || task.unloadingDock || '';
      task.status = plan.status === 'confirmed' ? 'in_transit' : (task.status || 'planned');
      if(!task.operationStatus) task.operationStatus = 'not_arrived';
    }
    sanitizeFactoryTaskState(task);
    return task;
  }

  function v4217SyncFactoryTasksFromPickupPlans(){
    let changed = false;
    pickupPlans.forEach(plan => {
      if(plan && v4217IsFactoryDestination(plan.destination) && plan.status !== 'cancelled'){
        const beforeCount = transportTasks.length;
        v4217EnsureFactoryReceivingTaskFromPickupPlan(plan);
        if(transportTasks.length !== beforeCount) changed = true;
      }
    });
    return changed;
  }

  // 重新覆盖提箱计划发布：目的地=工厂时，发布后立即生成工厂到货监控任务，初始状态=未到工厂。
  window.publishSingle = function(id){
    let v=validatePickupInput(id);
    if(!v.ok){alert(v.msg);return;}
    let cont=containers.find(c=>c.id===id);
    if(!cont)return;
    if(pickupPlans.some(p=>p.containerId===id&&p.status!=='cancelled')){alert('已有待确认计划');return;}
    let plan={id:nextIds.plan++,containerId:id,containerNo:cont.containerNo,containerSeq:cont.containerSeq||'',batch:cont.batch,arrivalDate:v.arrival,carrier:v.carrier,destination:v.dest,unloadingDock:v.dock,status:'pending',needReconfirm:false};
    pickupPlans.push(plan);
    if(v4217IsFactoryDestination(v.dest)) v4217EnsureFactoryReceivingTaskFromPickupPlan(plan);
    const viewState=capturePickupPlanViewState();
    saveData();
    refreshPickupPlanTablesKeepState(viewState);
    alert('计划已发布');
  };

  window.batchPublish = function(){
    let selected=document.querySelectorAll('.pickup-checkbox:checked');
    if(selected.length===0){alert('请先选择');return;}
    let count=0;
    for(let cb of selected){
      let id=parseInt(cb.dataset.id);
      let v=validatePickupInput(id);
      if(!v.ok){alert(`集装箱 ${containers.find(c=>c.id===id)?.containerNo||id}: ${v.msg}`);return;}
      let cont=containers.find(c=>c.id===id);
      if(cont&&!pickupPlans.some(p=>p.containerId===id&&p.status!=='cancelled')){
        let plan={id:nextIds.plan++,containerId:id,containerNo:cont.containerNo,containerSeq:cont.containerSeq||'',batch:cont.batch,arrivalDate:v.arrival,carrier:v.carrier,destination:v.dest,unloadingDock:v.dock,status:'pending',needReconfirm:false};
        pickupPlans.push(plan);
        if(v4217IsFactoryDestination(v.dest)) v4217EnsureFactoryReceivingTaskFromPickupPlan(plan);
        count++;
      }
    }
    if(count>0){
      const viewState=capturePickupPlanViewState();
      saveData();
      refreshPickupPlanTablesKeepState(viewState);
      alert(`成功发布 ${count} 个计划`);
    } else alert('没有可发布的计划');
  };

  // 重新覆盖运输公司确认提箱：如果发布时已生成工厂监控任务，则更新该任务，不再重复生成。
  window.confirmPickupTask = function(planId){
    let plan = pickupPlans.find(p => p.id === planId);
    if(!plan){alert('找不到计划');return;}
    let actualTime = document.getElementById(`pickupTime_${planId}`)?.value;
    if(!actualTime){alert('请填写实际提箱日期');return;}
    let cont = containers.find(c => c.id === plan.containerId);
    if(cont) cont.actualPickupTime = actualTime;
    plan.status = 'confirmed';
    plan.actualPickupTime = actualTime;
    plan.needReconfirm = false;
    let task = null;
    if(v4217IsFactoryDestination(plan.destination)){
      task = v4217EnsureFactoryReceivingTaskFromPickupPlan(plan);
      if(task){ task.status='in_transit'; task.actualPickupTime=actualTime; }
    }else{
      transportTasks.push({id:nextIds.task++,containerId:plan.containerId,containerNo:plan.containerNo,containerSeq:(cont?.containerSeq || plan.containerSeq || ''),batch:plan.batch,blNo:getTaskBlText(plan),iraNo:getIraList(plan.containerId),from:'港口',to:plan.destination,carrier:plan.carrier,status:'in_transit',operationStatus:'',estimatedArrival:plan.arrivalDate,unloadingDock:plan.unloadingDock||'',source:'pickupPlan',sourcePlanId:plan.id,createdAt:new Date().toISOString(),publishedAt:new Date().toISOString(),gateArrivalTime:'',gateReleaseTime:'',waitingAreaTime:'',unloadStartTime:'',unloadFinishTime:''});
    }
    saveData();
    let activeTab = document.querySelector('.date-tab.active');
    let keepDate = activeTab?.dataset?.date || getDatePart(plan.arrivalDate);
    let main = document.getElementById('mainContent');
    if (main && keepDate) window.renderTransportTasksWithDate(main, keepDate); else renderContent();
    alert(`已确认提箱 ${plan.containerNo}`);
  };

  // 重新覆盖撤回：提箱计划撤回时同步撤回尚未开始门岗/卸货流程的工厂监控任务。
  window.cancelPlan = function(planId){
    if(confirm('确定取消？')){
      let plan=pickupPlans.find(p=>p.id===planId);
      if(plan){
        let task = v4217FindExistingFactoryTaskByPickupPlan(plan);
        if(task && hasFactoryExecutionStarted(task)){
          alert('该计划已进入门岗/工厂收货执行环节，不允许在提箱计划中取消。');
          return;
        }
        plan.status='cancelled';
        if(task){ task.cancelled = true; task.status = 'cancelled'; task.operationStatus = 'cancelled'; }
        const viewState=capturePickupPlanViewState();
        saveData();
        refreshPickupPlanTablesKeepState(viewState);
        alert('已取消');
      }
    }
  };

  // 重新覆盖工厂监控取数：进入页面时自动补齐历史“提箱计划→工厂”但未生成监控任务的数据。
  const v4217OriginalGetFactoryReceivingTasksV41 = getFactoryReceivingTasksV41;
  getFactoryReceivingTasksV41 = function(date){
    v4217SyncFactoryTasksFromPickupPlans();
    return v4217OriginalGetFactoryReceivingTasksV41(date);
  };

})();

  // ==================== V42.19 修复：工厂完成卸货后运输任务结束并进入待还箱 ====================
  function v4218NeedReturnAfterFactoryUnload(task){
    if(!task) return false;
    const from = String(task.from || '').trim();
    const to = String(task.to || '').trim();
    return to === '工厂' && (from === '港口' || from === 'RG堆场');
  }

  function v4218EnsureReturnRecordAfterFactoryUnload(task){
    if(!task || !task.containerId) return;
    const cid = task.containerId;
    const loc = task.to || '工厂';
    const today = fmtDate(new Date().toISOString().split('T')[0]);

    // 港口 / RG堆场 → 工厂：完成卸货后必须进入待还箱。
    if(v4218NeedReturnAfterFactoryUnload(task)){
      const exists = returnRecords.some(r =>
        String(r.containerId) === String(cid) &&
        r.location === loc &&
        (r.type === 'return_needed' || r.type === 'return')
      );
      if(!exists){
        returnRecords.push({
          containerId: cid,
          location: loc,
          type: 'return_needed',
          unpackDate: today,
          isReturnConfirmed: false,
          fromLocation: task.from || '',
          createdBy: currentUser?.name || currentUser?.email || '',
          createdAt: new Date().toISOString()
        });
      }
    }else{
      // Rio Claro / IRA → 工厂：属于 Sider 二次配送，不进入还箱确认，仅保留卸货完成记录。
      const exists = returnRecords.some(r =>
        String(r.containerId) === String(cid) &&
        r.location === loc &&
        r.type === 'unpack'
      );
      if(!exists){
        returnRecords.push({
          containerId: cid,
          location: loc,
          type: 'unpack',
          unpackDate: today,
          isReturnConfirmed: true,
          fromLocation: task.from || '',
          createdBy: currentUser?.name || currentUser?.email || '',
          createdAt: new Date().toISOString()
        });
      }
    }
  }

  // 覆盖卸货完成：不能继续停留在运输中；按来源自动判断是否进入待还箱。
  window.finishUnloading = function(taskId){
    let t = transportTasks.find(x => x.id === taskId);
    if(!t) return;
    t.unloadFinishTime = t.unloadFinishTime || nowLocalInput();
    t.operationStatus = 'unloaded';
    t.status = 'arrived'; // 从运输公司“运输中”移除，但仍保留工厂收货已完成状态
    t.actualArrival = t.actualArrival || t.gateArrivalTime || t.waitingAreaTime || t.unloadFinishTime;
    if(t.containerId) addStock(t.containerId, '工厂');
    v4218EnsureReturnRecordAfterFactoryUnload(t);
    saveAndRenderContentKeepState();
    if(v4218NeedReturnAfterFactoryUnload(t)){
      alert('已确认掏箱完成，运输任务已结束，并已生成待还箱任务。');
    }else{
      alert('已确认掏箱完成，运输任务已结束。');
    }
  };

  // 运输公司任务只显示未完成执行任务；已完成卸货/已取消/已到厂完成的任务不再显示在运输中。
  isTransportCompanyVisibleTask = function(t){
    if(!t || !isOperationalVisibleTask(t)) return false;
    if(t.cancelled) return false;
    if(t.operationStatus === 'unloaded') return false;
    if(t.unloadFinishTime) return false;
    if(t.status === 'arrived' || t.status === 'completed' || t.status === 'cancelled') return false;
    return true;
  };

  /* ==================== V42.22 工厂日历联动生产计划维护 ====================
     修复：生产计划维护必须先判断工厂日历。休息日/法定假日不再强制维护，默认不可新增排产；特殊加班按工作日处理。
  */
  function v4222IsProductionRequiredDate(date, idx){
    return idx < 2 && isFactoryWorkday(date);
  }
  function v4222ProductionDayStatusText(date, idx){
    if(!isFactoryWorkday(date)) return getFactoryDayTypeLabel(getFactoryDayType(date)) + '｜不排产';
    if(idx === 0) return '今天 必填';
    if(idx === 1) return '明天 必填';

  function v4222ProductionDayStatusColor(date, idx){
    if(!isFactoryWorkday(date)) return '#f56c6c';

  }
  function v4222OpenAddProductionPlanModal(date, workshop){
    if(date && !isFactoryWorkday(date)){
      alert(`${fmtDate(date)} 是${getFactoryDayTypeLabel(getFactoryDayType(date))}，不能维护生产计划。如当天需要生产，请先到“工厂日历”设置为特殊加班。`);
      return;
    }
    if(typeof window.__originalOpenAddProductionPlanModalV4222 === 'function'){
      window.__originalOpenAddProductionPlanModalV4222(date, workshop);

  if(typeof window.openAddProductionPlanModal === 'function' && !window.__originalOpenAddProductionPlanModalV4222){
    window.__originalOpenAddProductionPlanModalV4222 = window.openAddProductionPlanModal;
    window.openAddProductionPlanModal = v4222OpenAddProductionPlanModal;
  }
  // 覆盖必填缺失检查：仅今天/明天且为工作日/特殊加班时才强制维护。
  getRequiredPlanMissingDates = function(baseDate){
    const dates = productionPlanBaseDates(baseDate).slice(0,2);
    return dates.filter((d,idx) => isFactoryWorkday(d) && getScheduleProductionPlans(d).length===0);
  };
  // 覆盖生产计划表格渲染：休息日/假日显示为灰红提示，不再标记“必填计划未维护”。
  renderProductionPlanGrid = function(baseDate){
    const dates = productionPlanBaseDates(baseDate);
    const workshops = productionPlanWorkshops();
    let html = '<div class="table-wrapper"><table class="data-table prod-plan-sheet"><thead><tr><th style="width:140px;">车间/产线</th>' + dates.map((d,i)=>{
      const bs = typeof v428Totals === 'function' ? v428Totals([d], p=>p.workshop==='welding') : productionPlanTotalsFor(d);
      const gaB = typeof v428Totals === 'function' ? v428Totals([d], p=>p.workshop==='assembly_b') : productionPlanTotalsFor(d,'assembly_b');

     问题：提箱计划从“港口→工厂”改为“港口→RG堆场/Rio Claro/IRA”后，旧工厂到货监控任务没有同步撤回，导致动态运输计划发布时提示“已有未完成工厂到货计划”。
     修复：编辑提箱计划时，如目的地从工厂改为非工厂，且门岗/卸货口尚未开始操作，则自动取消旧工厂监控任务；如已开始门岗/卸货执行，则禁止改为非工厂。
  */
  (function(){
    function v4227IsFactoryDestination(dest){
      const d = String(dest || '').trim();
      return d === '工厂' || d.toLowerCase() === 'factory' || d.toUpperCase() === 'GWM';
    }

    function v4227FindFactoryTaskByPlan(plan){
      if(!plan) return null;
      return (transportTasks || []).find(t =>
        t &&
        t.to === '工厂' &&
        !t.cancelled &&
        (
          String(t.sourcePlanId || '') === String(plan.id || '') ||
          (String(t.containerId || '') === String(plan.containerId || '') && String(t.source || '') === 'pickupPlan') ||
          (String(t.containerId || '') === String(plan.containerId || '') && String(t.estimatedArrival || '') === String(plan.arrivalDate || ''))
        )
      ) || null;
    }

    function v4227CancelFactoryTask(task, reason){
      if(!task) return false;
      if(typeof hasFactoryExecutionStarted === 'function' && hasFactoryExecutionStarted(task)){
        return false;
      }
      task.cancelled = true;
      task.status = 'cancelled';
      task.operationStatus = 'cancelled';
      task.cancelReason = reason || '提箱计划目的地变更，自动撤回工厂到货计划';
      task.cancelTime = new Date().toISOString();
      task.cancelUser = (currentUser && (currentUser.name || currentUser.email)) || '';
      return true;
    }

    function v4227EnsureOrUpdateFactoryTask(plan){
      if(typeof v4217EnsureFactoryReceivingTaskFromPickupPlan === 'function'){
        return v4217EnsureFactoryReceivingTaskFromPickupPlan(plan);
      }
      return null;
    }

    function v4227SyncPickupPlanDestination(plan, oldDestination){
      if(!plan) return true;
      const wasFactory = v4227IsFactoryDestination(oldDestination);
      const nowFactory = v4227IsFactoryDestination(plan.destination);
      const oldTask = v4227FindFactoryTaskByPlan(plan);

      if(wasFactory && !nowFactory && oldTask){
        if(typeof hasFactoryExecutionStarted === 'function' && hasFactoryExecutionStarted(oldTask)){
          alert('该集装箱已经进入门岗/卸货口执行流程，不能把目的地从工厂改为其他地点。');
          plan.destination = oldDestination;
          return false;
        }
        v4227CancelFactoryTask(oldTask, '提箱计划目的地从工厂改为' + (plan.destination || '-'));
      }

      if(nowFactory){
        const task = v4227EnsureOrUpdateFactoryTask(plan);
        if(task){
          task.cancelled = false;
          task.to = '工厂';
          task.from = '港口';
          task.estimatedArrival = plan.arrivalDate || task.estimatedArrival || '';
          task.unloadingDock = plan.unloadingDock || task.unloadingDock || '';
          task.carrier = plan.carrier || task.carrier || 'RG';
          if(!task.operationStatus || task.operationStatus === 'cancelled') task.operationStatus = 'not_arrived';
          if(!task.status || task.status === 'cancelled') task.status = plan.status === 'confirmed' ? 'in_transit' : 'planned';
        }
      }
      return true;
    }

    window.modifyPlan = function(planId){
      let plan = pickupPlans.find(p => p.id === planId);
      if(!plan) return;

      const old = {
        arrivalDate: plan.arrivalDate,
        carrier: plan.carrier,
        destination: plan.destination,
        unloadingDock: plan.unloadingDock,
        status: plan.status,
        needReconfirm: plan.needReconfirm
      };

      const newArrival = prompt('修改到货时间（格式：YYYY-MM-DDTHH:mm 或 YYYY/MM/DD HH:mm）', plan.arrivalDate || '');
      if(newArrival === null) return;
      const newCarrier = prompt('修改运输公司(RG/JSL)', plan.carrier || 'RG');
      if(newCarrier === null) return;
      const newDest = prompt('修改目的地（RG堆场/Rio Claro/IRA库房/工厂）', plan.destination || '');
      if(newDest === null) return;
      const newDock = prompt('修改卸货口（目的地为工厂时必填）', plan.unloadingDock || '');
      if(newDock === null) return;

      if(v4227IsFactoryDestination(newDest) && !String(newDock || '').trim()){
        alert('目的地为工厂时，卸货口必填');
        return;
      }

      if(newArrival) plan.arrivalDate = newArrival;
      if(newCarrier && (newCarrier === 'RG' || newCarrier === 'JSL')) plan.carrier = newCarrier;
      if(newDest) plan.destination = newDest;
      plan.unloadingDock = String(newDock || '').trim();
      plan.status = 'pending';
      plan.needReconfirm = true;
      plan.updatedAt = new Date().toISOString();
      plan.updatedBy = (currentUser && (currentUser.name || currentUser.email)) || '';

      const ok = v4227SyncPickupPlanDestination(plan, old.destination);
      if(!ok){
        plan.arrivalDate = old.arrivalDate;
        plan.carrier = old.carrier;
        plan.destination = old.destination;
        plan.unloadingDock = old.unloadingDock;
        plan.status = old.status;
        plan.needReconfirm = old.needReconfirm;
        return;
      }

      const viewState = typeof capturePickupPlanViewState === 'function' ? capturePickupPlanViewState() : null;
      saveData();
      if(typeof refreshPickupPlanTablesKeepState === 'function') refreshPickupPlanTablesKeepState(viewState);
      else renderContent();
      alert('计划已修改，关联的门岗/卸货口计划已同步更新，需运输公司重新确认。');
    };

    // 页面/数据加载后做一次清理：非工厂提箱计划不应保留未开始的工厂监控任务。
    window.v4227CleanupStaleFactoryTasks = function(){
      let changed = false;
      (pickupPlans || []).forEach(plan => {
        if(!plan || v4227IsFactoryDestination(plan.destination)) return;
        const task = v4227FindFactoryTaskByPlan(plan);
        if(task && !(typeof hasFactoryExecutionStarted === 'function' && hasFactoryExecutionStarted(task))){
          if(v4227CancelFactoryTask(task, '提箱计划目的地不是工厂，自动清理残留工厂到货计划')) changed = true;
        }
      });
      if(changed) saveData();
      return changed;
    };

    const oldRenderGateOnly = window.renderFactoryGateOnly;
    if(typeof oldRenderGateOnly === 'function'){
      window.renderFactoryGateOnly = function(container){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before gate skipped', e); }
        return oldRenderGateOnly.apply(this, arguments);
      };
    }
    const oldRenderDock = window.renderDockMonitoring;
    if(typeof oldRenderDock === 'function'){
      window.renderDockMonitoring = function(container){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before dock skipped', e); }
        return oldRenderDock.apply(this, arguments);
      };
    }

    // 动态运输计划发布前也先清理一次，避免旧残留任务继续阻挡新计划。
    const oldPublishDynamicSingle = window.publishDynamicSingle;
    if(typeof oldPublishDynamicSingle === 'function'){
      window.publishDynamicSingle = function(){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before dynamic publish skipped', e); }
        return oldPublishDynamicSingle.apply(this, arguments);
      };
    }
    const oldBatchPublishDynamic = window.batchPublishDynamic;
    if(typeof oldBatchPublishDynamic === 'function'){
      window.batchPublishDynamic = function(){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before dynamic batch skipped', e); }
        return oldBatchPublishDynamic.apply(this, arguments);
      };
    }
  })();

</script>

      return d.toISOString().slice(0,10);

      let guard = 0;
      while(result.length < (count || 3) && guard < 90){
        if(v424IsFactoryWorkday(d)) result.push(d);

    if(typeof oldRenderGateOnly === 'function'){
      window.renderFactoryGateOnly = function(container){

      alert('计划已修改，关联的门岗/卸货口计划已同步更新，需运输公司重新确认。');
    };

    // 页面/数据加载后做一次清理：非工厂提箱计划不应保留未开始的工厂监控任务。
    window.v4227CleanupStaleFactoryTasks = function(){
      let changed = false;
      (pickupPlans || []).forEach(plan => {
        if(!plan || v4227IsFactoryDestination(plan.destination)) return;
        const task = v4227FindFactoryTaskByPlan(plan);
        if(task && !(typeof hasFactoryExecutionStarted === 'function' && hasFactoryExecutionStarted(task))){
          if(v4227CancelFactoryTask(task, '提箱计划目的地不是工厂，自动清理残留工厂到货计划')) changed = true;
        }
      });
      if(changed) saveData();
      return changed;
    };

    const oldRenderGateOnly = window.renderFactoryGateOnly;
    if(typeof oldRenderGateOnly === 'function'){
      window.renderFactoryGateOnly = function(container){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before gate skipped', e); }
        return oldRenderGateOnly.apply(this, arguments);
      };
    }
    const oldRenderDock = window.renderDockMonitoring;
    if(typeof oldRenderDock === 'function'){
      window.renderDockMonitoring = function(container){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before dock skipped', e); }
        return oldRenderDock.apply(this, arguments);
      };
    }

    // 动态运输计划发布前也先清理一次，避免旧残留任务继续阻挡新计划。
    const oldPublishDynamicSingle = window.publishDynamicSingle;
    if(typeof oldPublishDynamicSingle === 'function'){
      window.publishDynamicSingle = function(){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before dynamic publish skipped', e); }
        return oldPublishDynamicSingle.apply(this, arguments);
      };
    }
    const oldBatchPublishDynamic = window.batchPublishDynamic;
    if(typeof oldBatchPublishDynamic === 'function'){
      window.batchPublishDynamic = function(){
        try{ window.v4227CleanupStaleFactoryTasks(); }catch(e){ console.warn('V43.0 cleanup before dynamic batch skipped', e); }
        return oldBatchPublishDynamic.apply(this, arguments);
      };
    }
  })();

</script>


<script>
/* ==================== V43.0 稳定联动版：统一目的地变更与工厂门岗/卸货口状态机 ====================
   重点：
   1）动态运输计划目的地从工厂改为其他库房/堆场时，同步撤回未开始的门岗/卸货口计划；
   2）动态运输计划目的地从其他地点改为工厂时，自动进入门岗/卸货口流程，初始状态=未到工厂；
   3）如果已经门岗登记/进厂/卸货，不允许改成非工厂或撤回，避免状态混乱；
   4）门岗/卸货口页面渲染前自动清理残留工厂计划。
*/
(function(){
  function isFactoryDestV43(dest){
    const d = String(dest || '').trim();
    return d === '工厂' || d.toLowerCase() === 'factory' || d.toUpperCase() === 'GWM';
  }

  function isTaskCancelledV43(t){
    return !t || t.cancelled || t.status === 'cancelled' || t.operationStatus === 'cancelled';
  }

  function hasFactoryExecutionStartedV43(t){
    if(!t) return false;
    try{
      if(typeof window.hasFactoryExecutionStarted === 'function' && window.hasFactoryExecutionStarted(t)) return true;
    }catch(e){}
    const op = String(t.operationStatus || '');
    return !!(
      t.gateArrivalTime || t.gateReleaseTime || t.waitingAreaTime ||
      t.unloadStartTime || t.unloadFinishTime ||
      ['outside_parking','inside_waiting','unloading','unloaded'].includes(op)
    );
  }

  function hydrateTaskMasterFieldsV43(t){
    if(!t) return t;
    const c = (containers || []).find(x => String(x.id) === String(t.containerId) || String(x.containerNo) === String(t.containerNo));
    if(c){
      t.containerId = t.containerId || c.id;
      t.containerNo = t.containerNo || c.containerNo;
      t.containerSeq = t.containerSeq || c.containerSeq || '';
      t.batch = t.batch || c.batch || '';
    }
    if(typeof getTaskBlText === 'function') t.blNo = t.blNo || getTaskBlText(t) || '';
    if(typeof getIraList === 'function' && t.containerId) t.iraNo = t.iraNo || getIraList(t.containerId) || '';
    return t;
  }

  function resetFactoryFlowV43(t){
    if(!t) return;
    t.operationStatus = 'not_arrived';
    t.gateArrivalTime = '';
    t.gateReleaseTime = '';
    t.waitingAreaTime = '';
    t.unloadStartTime = '';
    t.unloadFinishTime = '';
    if(t.status === 'cancelled' || t.status === 'completed') t.status = 'in_transit';
    if(!t.status) t.status = 'in_transit';
  }

  function detachFactoryFlowV43(t, reason){
    if(!t) return true;
    if(hasFactoryExecutionStartedV43(t)) return false;
    if(isFactoryDestV43(t.to)) return false;
    t.operationStatus = '';
    t.gateArrivalTime = '';
    t.gateReleaseTime = '';
    t.waitingAreaTime = '';
    t.unloadStartTime = '';
    t.unloadFinishTime = '';
    t.factorySyncRemark = reason || '目的地不是工厂，已移出门岗/卸货口流程';
    return true;
  }

  function cancelStaleFactoryTaskV43(task, reason){
    if(!task || hasFactoryExecutionStartedV43(task)) return false;
    task.cancelled = true;
    task.status = 'cancelled';
    task.operationStatus = 'cancelled';
    task.cancelReason = reason || '目的地变更，自动撤回残留工厂到货计划';
    task.cancelTime = new Date().toISOString();
    task.cancelUser = (currentUser && (currentUser.name || currentUser.email)) || '';
    return true;
  }

  function cleanupFactoryTasksV43(options){
    options = options || {};
    let changed = false;

    // 1. 非工厂任务本身不应进入门岗/卸货口流程。
    (transportTasks || []).forEach(t => {
      if(!t || isTaskCancelledV43(t)) return;
      if(!isFactoryDestV43(t.to)){
        const before = JSON.stringify([t.operationStatus,t.gateArrivalTime,t.gateReleaseTime,t.waitingAreaTime,t.unloadStartTime,t.unloadFinishTime]);
        detachFactoryFlowV43(t, '运输计划目的地不是工厂，自动移出工厂收货流程');
        const after = JSON.stringify([t.operationStatus,t.gateArrivalTime,t.gateReleaseTime,t.waitingAreaTime,t.unloadStartTime,t.unloadFinishTime]);
        if(before !== after) changed = true;
      }
    });

    // 2. 如果同一集装箱存在“当前仍在执行中的非工厂计划”，才撤回未开始的残留工厂计划。
    // V43.1 修复：历史已到达/已完成的港口→RG堆场/Rio Claro/IRA任务，只代表该箱当前位置，
    // 不应阻止后续 RG堆场/Rio Claro/IRA→工厂 的动态运输计划。
    function isActiveNonFactoryConflictV431(task){
      if(!task || isTaskCancelledV43(task) || isFactoryDestV43(task.to)) return false;
      const st = String(task.status || '').toLowerCase();
      const op = String(task.operationStatus || '').toLowerCase();
      if(['arrived','completed','unloaded','done','cancelled'].includes(st)) return false;
      if(['unloaded','cancelled','done'].includes(op)) return false;
      // 只有仍在计划/运输执行中的非工厂任务才代表“目的地仍被其他计划占用”。
      return ['planned','pending','pending_pickup','in_transit'].includes(st) ||
             ['not_arrived','outside_parking','inside_waiting','unloading'].includes(op);
    }
    (transportTasks || []).forEach(nonFactory => {
      if(!isActiveNonFactoryConflictV431(nonFactory)) return;
      (transportTasks || []).forEach(factoryTask => {
        if(!factoryTask || factoryTask.id === nonFactory.id || isTaskCancelledV43(factoryTask)) return;
        if(!isFactoryDestV43(factoryTask.to)) return;
        const sameContainer = String(factoryTask.containerId || '') === String(nonFactory.containerId || '') ||
                              String(factoryTask.containerNo || '') === String(nonFactory.containerNo || '');
        if(sameContainer && !hasFactoryExecutionStartedV43(factoryTask)){
          if(cancelStaleFactoryTaskV43(factoryTask, '同一集装箱仍存在未完成的非工厂运输计划：' + (nonFactory.to || '非工厂') + '，自动撤回残留工厂计划')) changed = true;
        }
      });
    });

    // 3. 工厂有效任务必须有明确初始状态和关键主数据。
    (transportTasks || []).forEach(t => {
      if(!t || isTaskCancelledV43(t) || !isFactoryDestV43(t.to)) return;
      hydrateTaskMasterFieldsV43(t);
      if(!t.operationStatus || t.operationStatus === 'cancelled'){
        t.operationStatus = 'not_arrived';
        changed = true;
      }
    });

    if(changed && !options.noSave){
      try{ saveData(); }catch(e){ console.warn('V43 cleanup save skipped', e); }
    }
    return changed;
  }

  window.v430CleanupFactoryTaskLinks = cleanupFactoryTasksV43;

  // 覆盖动态运输计划编辑：补齐“目的地变更 ↔ 门岗/卸货口计划”的双向联动。
  window.editDynamicTask = function(taskId){
    let task = (transportTasks || []).find(t => t.id === taskId);
    if(!task){ alert('未找到运输任务'); return; }
    if(isTaskCancelledV43(task)){ alert('已撤回计划不可编辑，可使用复制功能重新生成计划'); return; }

    const oldTo = task.to || '';
    const oldIsFactory = isFactoryDestV43(oldTo);
    const oldSnapshot = JSON.parse(JSON.stringify(task));

    let newEta = prompt('修改预计到达时间（必填，格式：YYYY-MM-DDTHH:mm 或 YYYY/MM/DD HH:mm）', task.estimatedArrival || '');
    if(newEta === null) return;
    let newDest = prompt('修改目的地（RG堆场/Rio Claro/IRA库房/工厂）', task.to || '工厂');
    if(newDest === null) return;
    newDest = String(newDest || '').trim();
    if(!['RG堆场','Rio Claro','IRA库房','工厂'].includes(newDest)){
      alert('目的地只能选择：RG堆场、Rio Claro、IRA库房、工厂');
      return;
    }
    let newDock = prompt('修改卸货口（目的地为工厂时必填）', task.unloadingDock || '');
    if(newDock === null) return;
    let newCarrier = prompt('修改运输公司（RG/JSL）', task.carrier || 'RG');
    if(newCarrier === null) return;

    let err = typeof validateDynamicPlanFields === 'function' ? validateDynamicPlanFields(newDest, newEta, newDock) : '';
    if(err){ alert(err); return; }

    const newIsFactory = isFactoryDestV43(newDest);
    if(oldIsFactory && !newIsFactory && hasFactoryExecutionStartedV43(task)){
      alert('该集装箱已经进入门岗/卸货口执行流程，不能把目的地从工厂改为其他地点。');
      return;
    }

    task.estimatedArrival = String(newEta || '').trim();
    task.to = newDest;
    task.unloadingDock = newIsFactory ? String(newDock || '').trim() : String(newDock || '').trim();
    task.carrier = (String(newCarrier || '').trim() || 'RG');
    task.lastEditedAt = new Date().toISOString();
    task.lastEditedBy = (currentUser && (currentUser.name || currentUser.email)) || '';

    delete task.oneDockReviewStatus;
    delete task.oneDockOrder;
    delete task.oneDockPlan;
    if(task.source === 'oneDockPlan') task.source = 'dynamic';

    if(newIsFactory){
      hydrateTaskMasterFieldsV43(task);
      if(!oldIsFactory) resetFactoryFlowV43(task);
      else if(!task.operationStatus) task.operationStatus = 'not_arrived';
    }else{
      detachFactoryFlowV43(task, '动态运输计划目的地从工厂改为' + newDest);
    }

    try{ cleanupFactoryTasksV43({noSave:true}); }catch(e){
      console.warn('V43 cleanup after dynamic edit failed', e);
      Object.assign(task, oldSnapshot);
      alert('计划联动校验失败，已恢复原状态。');
      return;
    }

    try{ saveAndRenderContentKeepState(); }catch(e){ saveData(); renderContent(); }
    alert('已发布运输计划已更新，门岗/卸货口计划已同步调整。');
  };

  // 覆盖撤回：进入门岗/卸货口流程后禁止撤回；未开始则同步清理工厂状态。
  window.withdrawDynamicTask = function(taskId){
    let task = (transportTasks || []).find(t => t.id === taskId);
    if(!task){ alert('未找到运输任务'); return; }
    if(isTaskCancelledV43(task)){ alert('该计划已撤回'); return; }
    if(isFactoryDestV43(task.to) && hasFactoryExecutionStartedV43(task)){
      alert('该集装箱已进入门岗/工厂收货执行环节，不允许撤回计划');
      return;
    }
    let reason = prompt('请输入撤回原因：工厂计划变更 / 清关异常 / 运输异常 / 库存调整 / 供应商原因 / 其他', '工厂计划变更');
    if(reason === null) return;
    reason = String(reason || '').trim();
    if(!reason){ alert('撤回原因不能为空'); return; }
    if(!confirm(`确认撤回 ${task.containerNo || ''} 的动态运输计划吗？`)) return;
    task.status = 'cancelled';
    task.cancelled = true;
    task.cancelReason = reason;
    task.cancelTime = new Date().toISOString();
    task.cancelUser = (currentUser && (currentUser.name || currentUser.email)) || '';
    task.operationStatus = 'cancelled';
    cleanupFactoryTasksV43({noSave:true});
    try{ saveAndRenderContentKeepState(); }catch(e){ saveData(); renderContent(); }
    alert('计划已撤回。该集装箱会重新回到动态运输计划待发布列表，可重新发布。');
  };

  // 发布前后清理残留任务，避免误提示“已有未完成工厂到货计划”。
  const basePublishDynamicSingleV43 = window.publishDynamicSingle;
  if(typeof basePublishDynamicSingleV43 === 'function'){
    window.publishDynamicSingle = function(){
      cleanupFactoryTasksV43({noSave:true});
      const ret = basePublishDynamicSingleV43.apply(this, arguments);
      cleanupFactoryTasksV43();
      return ret;
    };
  }
  const baseBatchPublishDynamicV43 = window.batchPublishDynamic;
  if(typeof baseBatchPublishDynamicV43 === 'function'){
    window.batchPublishDynamic = function(){
      cleanupFactoryTasksV43({noSave:true});
      const ret = baseBatchPublishDynamicV43.apply(this, arguments);
      cleanupFactoryTasksV43();
      return ret;
    };
  }

  // 门岗和卸货口渲染前统一清理，避免残留计划显示。
  const baseRenderGateV43 = window.renderFactoryGateOnly;
  if(typeof baseRenderGateV43 === 'function'){
    window.renderFactoryGateOnly = function(){
      cleanupFactoryTasksV43();
      return baseRenderGateV43.apply(this, arguments);
    };
  }
  const baseRenderDockV43 = window.renderDockMonitoring;
  if(typeof baseRenderDockV43 === 'function'){
    window.renderDockMonitoring = function(){
      cleanupFactoryTasksV43();
      return baseRenderDockV43.apply(this, arguments);
    };
  }

  // 工厂任务列表只读有效目的地=工厂的任务，不显示已取消/已完结/残留非工厂任务。
  window.getFactoryOperationTasks = function(date){
    cleanupFactoryTasksV43({noSave:true});
    let tasks = (transportTasks || []).filter(t =>
      t && isFactoryDestV43(t.to) && !isTaskCancelledV43(t) &&
      (typeof isOperationalVisibleTask !== 'function' || isOperationalVisibleTask(t)) &&
      t.status !== 'completed' && t.operationStatus !== 'unloaded'
    );
    if(date){
      tasks = tasks.filter(t =>
        getDatePart(t.estimatedArrival || t.plannedDate || '') === date ||
        getDatePart(t.gateArrivalTime || '') === date ||
        getDatePart(t.unloadStartTime || '') === date ||
        getDatePart(t.unloadFinishTime || '') === date
      );
    }
    return tasks.sort((a,b)=>
      String(a.estimatedArrival||'').localeCompare(String(b.estimatedArrival||'')) ||
      String(a.unloadingDock||'').localeCompare(String(b.unloadingDock||''),'zh-CN',{numeric:true}) ||
      (typeof compareProductionSequence === 'function' ? compareProductionSequence(a,b) : 0)
    );
  };

  // 首次打开时清理一次历史残留。
  setTimeout(()=>{ try{ cleanupFactoryTasksV43(); }catch(e){ console.warn('V43 initial cleanup skipped', e); } }, 800);
})();
</script>
